name: Release

# Publishes to npm with provenance when a semver tag (vX.Y.Z) is pushed.
#
# One-time setup: add an `NPM_TOKEN` repo secret (an npm "Automation" token).
#
# RECOMMENDED ALTERNATIVE — npm Trusted Publishing (OIDC): configure this repo +
# workflow as a trusted publisher on npmjs.com, then drop the `NODE_AUTH_TOKEN`
# line below. Provenance is attested either way via `id-token: write`.
# See: https://docs.npmjs.com/trusted-publishers

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (bob + config plugin)
        run: npm run build

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
